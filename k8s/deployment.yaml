apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-service
  template:
    metadata:
      labels:
        app: my-service
    spec:
      containers:
        - name: my-service
          image: my-org/my-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://db-service:5432/mydb
            - name: REDIS_URL
              value: redis://redis-service:6379
